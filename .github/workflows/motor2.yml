name: Motor 2 - Conferencia diaria

on:
  workflow_dispatch:

jobs:
  conferencia:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Rodar Motor 2
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LINX_CHAVE: ${{ secrets.LINX_CHAVE }}
        run: python motor2_conferencia.py
